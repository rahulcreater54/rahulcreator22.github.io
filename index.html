<!DOCTYPE html>
<html>
<head>
    <title>Rahul | Cyber Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0a0f1f, #000);
            color: white;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-right: 1px solid rgba(0,255,255,0.2);
        }

        .sidebar h2 {
            color: cyan;
        }

        .nav-item {
            margin: 15px 0;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
        }

        .nav-item:hover {
            background: rgba(0,255,255,0.1);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,255,255,0.2);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }

        /* INPUTS */
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: cyan;
            color: black;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #00ffff;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: cyan;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ CYBER</h2>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Projects</div>
    <div class="nav-item">Analytics</div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div class="title">Cybersecurity Dashboard</div>
        <div>🟢 Online</div>
    </div>

    <!-- PROJECTS -->
    <h2>Projects</h2>
    <div id="projectList"></div>

    <!-- ADD PROJECT -->
    <div class="card">
        <h3>Add Project</h3>
        <input id="title" placeholder="Project Title">
        <textarea id="desc" placeholder="Description"></textarea>
        <input id="img" placeholder="Image URL">
        <button onclick="addProject()">Add Project</button>
    </div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || [];

function displayProjects() {
    document.getElementById("projectList").innerHTML = "";

    projects.forEach((p, index) => {
        let card = document.createElement("div");
        card.className = "card";

        let content = "<h3>" + p.title + "</h3><p>" + p.desc + "</p>";

        if (p.img) {
            content += "<img src='" + p.img + "'>";
        }

        content += "<br><button onclick='deleteProject(" + index + ")'>Delete</button>";

        card.innerHTML = content;

        document.getElementById("projectList").appendChild(card);
    });
}

function addProject() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let img = document.getElementById("img").value;

    if (!title || !desc) {
        alert("Fill all fields");
        return;
    }

    projects.push({ title, desc, img });
    localStorage.setItem("projects", JSON.stringify(projects));

    displayProjects();

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("img").value = "";
}

function deleteProject(index) {
    projects.splice(index, 1);
    localStorage.setItem("projects", JSON.stringify(projects));
    displayProjects();
}

displayProjects();
</script>

</body>
</html>
